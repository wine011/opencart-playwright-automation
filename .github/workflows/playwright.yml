name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: opencart
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PHP & Extensions
        run: |
          sudo apt update
          sudo apt install -y php php-mysql unzip

      - name: Copy OpenCart Files
        run: |
          cp -r .github/ci-opencart/upload/* .
          chmod -R 777 storage/
      
      # Optional: pre-seed database if needed
      - name: Seed Database
        run: |
          mysql -h 127.0.0.1 -uroot -proot opencart < .github/ci-opencart/db_seed.sql || echo "No seed file found"

      - name: Start PHP Server
        run: |
          php -S localhost:8000 &
          sleep 10  # wait for server to be ready

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          APP_URL: http://localhost:8000
        run: npx playwright test

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30